<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daytale | Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=DM+Sans:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8F4EF;
            --text: #18130F;
            --accent: #B86B5A;
            --muted: #8C7B74;
            --hairline: #E2D9D3;
            --cell-bg: #F0EAE4;
            --empty-bg: #EDE5DF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            line-height: 1.4;
        }

        button, a {
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            background: none;
            border: none;
            font-family: inherit;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 56px;
            background-color: var(--bg);
            border-bottom: 1px solid var(--hairline);
            z-index: 100;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 400;
            font-size: 22px;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            font-size: 13px;
            padding: 6px 16px;
            color: var(--muted);
            transition: color 0.2s ease;
        }

        .tab-btn.active {
            color: var(--text);
            border-bottom: 1px solid var(--text);
        }

        .nav-draw {
            font-size: 12px;
            color: var(--accent);
        }

        /* CONTENT WRAPPERS */
        .view-section {
            display: none;
            padding: 80px 40px 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .view-section.active {
            display: block;
        }

        .view-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
            margin-bottom: 48px;
        }

        .view-title {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 400;
            color: var(--text);
            text-align: center;
        }

        .nav-arrow {
            font-size: 24px;
            color: var(--muted);
            transition: color 0.2s;
        }

        .nav-arrow:hover { color: var(--text); }

        /* EMPTY STATE */
        #empty-state {
            display: none;
            text-align: center;
            padding-top: 120px;
        }

        .empty-title {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 32px;
            color: var(--muted);
        }

        .empty-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 16px;
        }

        .empty-link {
            display: inline-block;
            margin-top: 24px;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 20px;
            color: var(--accent);
            border-bottom: 1px solid var(--accent);
        }

        /* YEAR VIEW */
        .year-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 32px;
        }

        .month-block-name {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .day-grid-tiny {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }

        .cell-tiny {
            aspect-ratio: 1;
            border-radius: 3px;
            background-color: var(--empty-bg);
            opacity: 0.5;
        }

        /* MONTH VIEW */
        .month-view-container { max-width: 700px; margin: 0 auto; }
        .calendar-labels {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 8px;
        }

        .label-day {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-align: center;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .cell-main {
            aspect-ratio: 1;
            border-radius: 6px;
            background-color: var(--empty-bg);
            opacity: 0.4;
            position: relative;
            overflow: hidden;
        }

        .cell-filled {
            opacity: 1;
            background-size: cover;
            background-position: center;
            cursor: pointer;
        }

        .cell-filled::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--text);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .cell-filled:hover::after { opacity: 0.15; }

        .cell-today {
            outline: 1.5px solid var(--accent);
            outline-offset: 2px;
        }

        .cell-year-today {
            outline: 1px solid var(--accent);
            outline-offset: 1px;
        }

        /* WEEK VIEW */
        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            max-width: 700px;
            margin: 0 auto;
        }

        .week-col { display: flex; flex-direction: column; align-items: center; }
        .week-day-label { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
        .week-rect {
            width: 100%;
            aspect-ratio: 9/16;
            border-radius: 10px;
            background-color: var(--empty-bg);
            opacity: 0.4;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        .week-rect.filled { opacity: 1; cursor: pointer; }
        .week-note {
            font-size: 11px;
            color: var(--muted);
            margin-top: 6px;
            text-align: center;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .week-col.today .week-rect {
            outline: 1.5px solid var(--accent);
            outline-offset: 2px;
        }

        /* MODAL */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(24, 19, 15, 0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-card {
            background-color: var(--bg);
            padding: 40px;
            max-width: 420px;
            width: 90vw;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 18px;
            color: var(--muted);
        }

        .modal-date {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
        }

        .modal-img {
            width: 100%;
            border-radius: 4px;
            margin-top: 16px;
            display: block;
        }

        .modal-note {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 400;
            font-size: 18px;
            color: var(--text);
            line-height: 1.5;
            margin-top: 16px;
        }

        .modal-actions {
            margin-top: 24px;
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .modal-link-story {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 16px;
            color: var(--accent);
            border-bottom: 1px solid var(--accent);
        }

        .modal-link-close {
            font-size: 13px;
            color: var(--muted);
        }

        .modal-sealed {
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0.6;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--muted);
            text-transform: uppercase;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .navbar { padding: 0 20px; }
            .tab-btn { font-size: 11px; padding: 6px 10px; }
            .view-section { padding: 80px 20px 40px; }
            .year-grid { grid-template-columns: repeat(2, 1fr); }
            .week-grid { gap: 6px; }
            .week-note { display: none; }
            .modal-card { padding: 28px 20px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">daytale</a>
        <div class="nav-tabs">
            <button class="tab-btn" onclick="switchView('year')">year</button>
            <button class="tab-btn active" onclick="switchView('month')">month</button>
            <button class="tab-btn" onclick="switchView('week')">week</button>
        </div>
        <a href="draw.html" class="nav-draw">draw today</a>
    </nav>

    <div id="empty-state">
        <h2 class="empty-title">nothing here yet.</h2>
        <p class="empty-sub">your drawings will appear here after your first day.</p>
        <a href="draw.html" class="empty-link">start drawing</a>
    </div>

    <section id="year-view" class="view-section">
        <h1 class="view-title" id="year-display" style="font-size: 48px; margin-bottom: 48px;">2024</h1>
        <div class="year-grid" id="year-months-container"></div>
    </section>

    <section id="month-view" class="view-section active">
        <div class="view-header">
            <button class="nav-arrow" onclick="changeMonth(-1)">&lsaquo;</button>
            <h2 class="view-title" id="month-display" style="font-size: 36px;">march 2026</h2>
            <button class="nav-arrow" onclick="changeMonth(1)">&rsaquo;</button>
        </div>
        <div class="month-view-container">
            <div class="calendar-labels">
                <div class="label-day">S</div><div class="label-day">M</div><div class="label-day">T</div>
                <div class="label-day">W</div><div class="label-day">T</div><div class="label-day">F</div>
                <div class="label-day">S</div>
            </div>
            <div class="calendar-grid" id="month-grid"></div>
        </div>
    </section>

    <section id="week-view" class="view-section">
        <div class="view-header">
            <button class="nav-arrow" onclick="changeWeek(-1)">&lsaquo;</button>
            <h2 class="view-title" id="week-display" style="font-size: 28px;">mar 3 to mar 9</h2>
            <button class="nav-arrow" onclick="changeWeek(1)">&rsaquo;</button>
        </div>
        <div class="week-grid" id="week-container"></div>
    </section>

    <div id="modal-overlay" onclick="closeModal(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">x</button>
            <div class="modal-date" id="modal-date">MONDAY, MARCH 6, 2026</div>
            <img src="" alt="" class="modal-img" id="modal-img">
            <p class="modal-note" id="modal-note"></p>
            <div class="modal-actions">
                <a href="#" class="modal-link-story" id="modal-card-link">make a story card</a>
                <button class="modal-link-close" onclick="closeModal()">close</button>
            </div>
            <div class="modal-sealed">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <span>this day is sealed</span>
            </div>
        </div>
    </div>

    <script>
        const entries = {};
        let currentMonthDate = new Date();
        let currentWeekDate = new Date();
        const todayStr = new Date().toISOString().split('T')[0];

        // LOAD DATA
        function loadData() {
            let hasData = false;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('daytale_')) {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        const dateKey = key.replace('daytale_', '');
                        entries[dateKey] = data;
                        hasData = true;
                    } catch(e) {}
                }
            }
            if (!hasData) {
                document.getElementById('empty-state').style.display = 'block';
                document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
                document.querySelector('.navbar').style.display = 'flex'; 
            }
        }

        // TABS
        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(view + '-view').classList.add('active');
            event.target.classList.add('active');
            
            if(view === 'year') renderYear();
            if(view === 'month') renderMonth();
            if(view === 'week') renderWeek();
        }

        // MODAL
        function openDay(date) {
            const entry = entries[date];
            if(!entry) return;
            const d = new Date(date + 'T00:00:00');
            document.getElementById('modal-date').innerText = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
            document.getElementById('modal-img').src = entry.dataURL;
            document.getElementById('modal-note').innerText = entry.note || "";
            document.getElementById('modal-card-link').href = `card.html?date=${date}`;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal(e) {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        // YEAR VIEW
        function renderYear() {
            const year = currentMonthDate.getFullYear();
            document.getElementById('year-display').innerText = year;
            const container = document.getElementById('year-months-container');
            container.innerHTML = '';
            
            const monthNames = ["january", "february", "march", "april", "may", "june", "july", "august", "september", "october", "november", "december"];
            
            monthNames.forEach((name, index) => {
                const block = document.createElement('div');
                block.className = 'month-block';
                block.innerHTML = `<div class="month-block-name">${name}</div>`;
                
                const grid = document.createElement('div');
                grid.className = 'day-grid-tiny';
                
                const daysInMonth = new Date(year, index + 1, 0).getDate();
                for(let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(index + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const cell = document.createElement('div');
                    cell.className = 'cell-tiny';
                    if(entries[dateStr]) {
                        cell.style.backgroundImage = `url(${entries[dateStr].dataURL})`;
                        cell.style.backgroundSize = 'cover';
                        cell.style.opacity = '1';
                        cell.style.cursor = 'pointer';
                        cell.onclick = () => openDay(dateStr);
                    }
                    if(dateStr === todayStr) cell.classList.add('cell-year-today');
                    grid.appendChild(cell);
                }
                block.appendChild(grid);
                container.appendChild(block);
            });
        }

        // MONTH VIEW
        function renderMonth() {
            const year = currentMonthDate.getFullYear();
            const month = currentMonthDate.getMonth();
            const monthName = currentMonthDate.toLocaleString('en-US', { month: 'long' }).toLowerCase();
            document.getElementById('month-display').innerText = `${monthName} ${year}`;
            
            const grid = document.getElementById('month-grid');
            grid.innerHTML = '';
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            for(let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }
            
            for(let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const cell = document.createElement('div');
                cell.className = 'cell-main';
                if(entries[dateStr]) {
                    cell.classList.add('cell-filled');
                    cell.style.backgroundImage = `url(${entries[dateStr].dataURL})`;
                    cell.onclick = () => openDay(dateStr);
                }
                if(dateStr === todayStr) cell.classList.add('cell-today');
                grid.appendChild(cell);
            }
        }

        function changeMonth(dir) {
            currentMonthDate.setMonth(currentMonthDate.getMonth() + dir);
            renderMonth();
        }

        // WEEK VIEW
        function renderWeek() {
            const startOfWeek = new Date(currentWeekDate);
            startOfWeek.setDate(currentWeekDate.getDate() - currentWeekDate.getDay());
            
            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);
            
            const formatDate = (d) => d.toLocaleString('en-US', { month: 'short', day: 'numeric' }).toLowerCase();
            document.getElementById('week-display').innerText = `${formatDate(startOfWeek)} to ${formatDate(endOfWeek)}`;
            
            const container = document.getElementById('week-container');
            container.innerHTML = '';
            
            const initials = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
            
            for(let i = 0; i < 7; i++) {
                const current = new Date(startOfWeek);
                current.setDate(startOfWeek.getDate() + i);
                const dateStr = current.toISOString().split('T')[0];
                
                const col = document.createElement('div');
                col.className = 'week-col';
                if(dateStr === todayStr) col.classList.add('today');
                
                const entry = entries[dateStr];
                col.innerHTML = `
                    <div class="week-day-label">${initials[i]}</div>
                    <div class="week-rect ${entry ? 'filled' : ''}" style="${entry ? `background-image:url(${entry.dataURL})` : ''}" ${entry ? `onclick="openDay('${dateStr}')"` : ''}></div>
                    <div class="week-note">${entry ? entry.note || '' : ''}</div>
                `;
                container.appendChild(col);
            }
        }

        function changeWeek(dir) {
            currentWeekDate.setDate(currentWeekDate.getDate() + (dir * 7));
            renderWeek();
        }

        // INIT
        window.onload = () => {
            loadData();
            renderMonth();
        };
    </script>
</body>
</html>
